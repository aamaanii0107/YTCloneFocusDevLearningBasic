<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Lesson 2 Exercises</title>
    <style>
      .uber-button {
        background-color: black;
        color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.15s;
      }
      .uber-button:hover {
        opacity: 0.85;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
      }
      .uber-button:active {
        opacity: 0.5;
      }
      .amazon-button {
        background-color: rgb(255, 216, 20);
        border: none;
        border-radius: 50px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.15s;
      }
      .amazon-button:hover {
        opacity: 0.85;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
      }
      .amazon-button:active {
        opacity: 0.5;
      }
      .github-button {
        background-color: rgb(46, 164, 79);
        border: none;
        color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 5px;
        font-weight: bold;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.15s;
      }
      .github-button:hover {
        opacity: 0.85;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
      }
      .github-button:active {
        opacity: 0.5;
      }
      .get-started-button {
        background-color: rgb(121, 82, 179);
        border: none;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        color: white;
        border-radius: 5px;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.15s;
      }
      .get-started-button:hover {
        opacity: 0.85;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
      }
      .get-started-button:active {
        opacity: 0.5;
      }
      .download-button {
        background-color: white;
        border-radius: 5px;
        border-width: 1px;
        padding-top: 9px;
        padding-bottom: 9px;
        padding-left: 15px;
        padding-right: 15px;
        margin-left: 10px;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.15s;
      }
      .download-button:hover {
        opacity: 0.85;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
      }
      .download-button:active {
        opacity: 0.5;
      }
      .apply-button {
        background-color: rgb(10, 102, 194);
        color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        border: none;
        border-radius: 100px;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.15s;
      }
      .apply-button:hover {
        opacity: 0.85;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
      }
      .apply-button:active {
        opacity: 0.5;
      }
      .save-button {
        background-color: white;
        color: rgb(10, 102, 194);
        border-color: rgb(10, 102, 194);
        padding-top: 9px;
        padding-bottom: 9px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 40px;
        margin-left: 10px;
        border: solid;
        border-width: 1px;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.15s;
      }
      .save-button:hover {
        opacity: 0.85;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
      }
      .save-button:active {
        opacity: 0.5;
      }
      .price {
        color: green;
        font-size: 20px;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.15s;
      }
      .cart-button {
        background-color: rgb(255, 216, 20);
        border: none;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 60px;
        margin-right: 10px;
        margin-bottom: 100px;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.15s;
      }
      .cart-button:hover {
        opacity: 0.85;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
      }
      .cart-button:active {
        opacity: 0.5;
      }
      .buy-now-button {
        background-color: rgb(255, 164, 28);
        border: none;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 50px;
        cursor: pointer;
        transition:
          opacity 0.15s,
          box-shadow 0.15s;
      }
      .buy-now-button:hover {
        opacity: 0.85;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.15);
      }
      .buy-now-button:active {
        opacity: 0.5;
      }
    </style>
  </head>
  <body>
    <h2>Lesson 2 Exercise a. <em>Uber button</em></h2>
    <button class="uber-button">Request now</button>
    <h2>Lesson 2 Exercise b. <em>Amazon button</em></h2>
    <button class="amazon-button">Add to cart</button>
    <h2>Lesson 2 Exercise c. <em>Github button</em></h2>
    <button class="github-button">Sign up</button>
    <h2>Lesson 2 Exercise d. <em>Bootstrap button</em></h2>
    <button class="get-started-button">Get started</button>
    <button class="download-button">Download</button>
    <h2>Lesson 2 Exercise e. <em>LinkedIn button</em></h2>
    <button class="apply-button">Apply on company website</button>
    <button class="save-button">Save</button>
    <h2>Lesson 2 Exercise f. <em>Nike shopping</em></h2>
    <a href="https://www.amazon.com" target="_blank"> Back to amazon</a>
    <h1>Nike Black Running Shoes</h1>
    <p class="price">$39-in stock.</p>
    <p>Free delivery tomorrow.</p>
    <button class="cart-button">Add to cart</button>

    <button class="buy-now-button">Buy Now</button>
  </body>
</html>
