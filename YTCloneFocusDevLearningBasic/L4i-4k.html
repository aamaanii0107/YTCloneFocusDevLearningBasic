<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS box model</title>
    <style>
      .back-button {
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        border-radius: 3px;
      }
      .first-page-button {
        background-color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        border: none;
      }
      .second-page-button {
        background-color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        border: none;
      }
      .third-page-button {
        background-color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        border: none;
      }
      .fourth-page-button {
        background-color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        border: none;
      }
      .fifth-page-button {
        background-color: white;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        border: none;
      }
      .next-button {
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        border-radius: 3px;
      }

      .stretch-button {
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        background-color: rgb(8, 142, 8);
        color: white;
        border: none;
        border-radius: 3px;
        cursor: pointer;
        transition:
          padding-top 0.35s,
          padding-bottom 0.35s,
          padding-right 0.35s,
          padding-left 0.35s,
          box-shadow 0.35s;
      }
      .stretch-button:hover {
        padding-top: 15px;
        padding-bottom: 15px;
        padding-right: 15px;
        padding-left: 15px;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
      }
      .stretch-button:active {
        opacity: 0.75;
      }
      .shadow-button {
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        background-color: rgb(8, 142, 8);
        color: white;
        border: none;
        cursor: pointer;
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.5);
        transition:
          margin-top 0.05s,
          margin-left 0.05s;
      }
      .shadow-button:active {
        margin-top: 2px;
        margin-left: 2px;
        box-shadow: none;
        opacity: 0.75;
      }
      .one-button {
        background-color: rgb(8, 142, 8);
        color: white;
        border: none;
        border-radius: 3px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        margin-right: 20px;
        margin-left: 20px;
        cursor: pointer;
      }
      .one-button:hover {
        margin-left: 15px;
        margin-right: 15px;
        padding-left: 15px;
        padding-right: 15px;
      }
      .two-button {
        background-color: rgb(8, 142, 8);
        color: white;
        border: none;
        border-radius: 3px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        margin-right: 20px;
        margin-left: 20px;
        cursor: pointer;
      }
      .two-button:hover {
        margin-left: 15px;
        margin-right: 15px;
        padding-left: 15px;
        padding-right: 15px;
      }
      .three-button {
        background-color: rgb(8, 142, 8);
        color: white;
        border: none;
        border-radius: 3px;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-right: 10px;
        padding-left: 10px;
        margin-right: 20px;
        margin-left: 20px;
        cursor: pointer;
      }
      .three-button:hover {
        margin-left: 15px;
        margin-right: 15px;
        padding-left: 15px;
        padding-right: 15px;
      }
    </style>
  </head>
  <body>
    <h1>4h Pagination</h1>
    <button class="back-button">Back</button>
    <button class="first-page-button">1</button>
    <button class="second-page-button">2</button>
    <button class="third-page-button">3</button>
    <button class="fourth-page-button">4</button>
    <button class="fifth-page-button">5</button>
    <button class="next-button">Next</button>

    <h1>4i Stretch</h1>
    <button class="stretch-button">Stretch</button>
    <h1>4j 3D click</h1>
    <button class="shadow-button">Shadow</button>
    <h1>4k Margin and Padding together</h1>
    <button class="one-button">One</button>
    <button class="two-button">Two</button>
    <button class="three-button">Three</button>
  </body>
</html>
