<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS practice</title>
    <style>
      .subscribe-button {
        background-color: rgb(204, 0, 0);
        color: white;
        border: none;
        padding-top: 10px;
        padding-right: 15px;
        padding-left: 15px;
        padding-bottom: 10px;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 10px;
        margin-left: 10px;
        transition: opacity 0.15s;
        vertical-align: top;
      }
      .subscribe-button:hover {
        opacity: 0.75;
      }

      .subscribe-button:active {
        opacity: 0.5;
      }
      .join-button {
        background-color: rgb(255, 255, 255);
        color: rgb(6, 95, 212);
        border-color: rgb(6, 95, 212);
        padding-top: 9px;
        padding-bottom: 9px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 15px;
        border-style: solid;
        border-width: 1px;
        margin-right: 10px;
        transition:
          background-color 0.15s,
          color 0.15s;
        vertical-align: top;
      }
      .join-button:hover {
        background-color: rgb(6, 95, 212);
        color: white;
      }
      .join-button:active {
        opacity: 0.75;
      }
      .tweet-button {
        background-color: rgb(29, 155, 240);
        color: rgb(255, 255, 255);
        border: none;
        padding-top: 10px;
        padding-bottom: 10px;
        padding-left: 15px;
        padding-right: 15px;
        border-radius: 32px;
        cursor: pointer;
        font-size: 15px;
        font-weight: bold;
        transition: box-shadow 0.15s;
        vertical-align: top;
      }
      .tweet-button:hover {
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.25);
      }
      .tweet-button:active {
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <button class="subscribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN MY CHANNEL</button>
    <button class="tweet-button">Tweet</button>
  </body>
</html>
