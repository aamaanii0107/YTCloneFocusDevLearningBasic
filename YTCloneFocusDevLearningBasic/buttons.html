<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CSS practice</title>
    <style>
      .subscribe-button {
        background-color: rgb(200, 0, 0);
        color: white;
        border: none;
        height: 40px;
        width: 105px;
        border-radius: 5px;
        cursor: pointer;
        margin-right: 10px;
        transition: opacity 0.15s;
      }
      .subscribe-button:hover {
        opacity: 0.75;
      }

      .subscribe-button:active {
        opacity: 0.5;
      }
      .join-button {
        background-color: rgb(255, 255, 255);
        color: blue;
        border-color: blue;
        height: 40px;
        width: 65px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 15px;
        border-style: solid;
        border-width: 1px;
        margin-right: 10px;
        transition:
          background-color 0.15s,
          color 0.15s;
      }
      .join-button:hover {
        background-color: rgb(53, 104, 224);
        color: white;
      }
      .join-button:active {
        opacity: 0.75;
      }
      .tweet-button {
        background-color: rgb(32, 179, 247);
        color: rgb(255, 255, 255);
        border: none;
        height: 40px;
        width: 70px;
        border-radius: 32px;
        cursor: pointer;
        font-size: 15px;
        font-weight: bold;
        transition: box-shadow 0.15s;
      }
      .tweet-button:hover {
        box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.25);
      }
      .tweet-button:active {
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <button class="subscribe-button">SUBSCRIBE</button>
    <button class="join-button">JOIN</button>
    <button class="tweet-button">Tweet</button>
  </body>
</html>
